<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fruity backdrop -->
    <radialGradient id="bgGlow" cx="35%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#FF6EC7" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#FF8A3D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD56A" stop-opacity="0.10"/>
    </radialGradient>

    <!-- Modern “mint-soda” envelope -->
    <linearGradient id="envelopeGradient" x1="96" y1="144" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1FE6B6"/>
      <stop offset="55%" stop-color="#27B7FF"/>
      <stop offset="100%" stop-color="#1A6BFF"/>
    </linearGradient>

    <!-- Envelope depth -->
    <linearGradient id="flapShade" x1="256" y1="184" x2="256" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B2A4A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#081B30" stop-opacity="0.32"/>
    </linearGradient>

    <!-- Mango–strawberry “spark” -->
    <linearGradient id="sparkGradient" x1="168" y1="72" x2="360" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF07A"/>
      <stop offset="45%" stop-color="#FFB100"/>
      <stop offset="100%" stop-color="#FF3D7A"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="elevate" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#091A2B" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#091A2B" flood-opacity="0.20"/>
    </filter>

    <!-- Subtle glass highlight -->
    <linearGradient id="glassSheen" x1="120" y1="156" x2="300" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.36"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- background glow (keeps it modern + fruity) -->
  <circle cx="170" cy="140" r="210" fill="url(#bgGlow)"/>
  <circle cx="402" cy="332" r="170" fill="url(#bgGlow)" opacity="0.7"/>

  <g filter="url(#elevate)">
    <!-- rounded envelope body -->
    <rect x="56" y="144" width="400" height="320" rx="64" fill="url(#envelopeGradient)"/>

    <!-- inner depth -->
    <path d="M56 208L256 340L456 208V400c0 35.346-28.654 64-64 64H120c-35.346 0-64-28.654-64-64V208Z"
          fill="url(#flapShade)"/>

    <!-- front flap -->
    <path d="M56 208L256 340L456 208L256 320L56 208Z" fill="#0B2A4A" opacity="0.10"/>

    <!-- glass sheen -->
    <path d="M92 174c26-20 78-34 128-30 44 4 73 20 97 48 18 20 38 28 60 28
             v36c-28 0-56-12-78-36-20-22-44-34-78-38-42-4-82 8-104 24-16 12-28 26-33 40
             v-42c0-10 3-22 8-30Z"
          fill="url(#glassSheen)"/>
  </g>

  <!-- fruity spark (rounded lightning) -->
  <path d="M232 72c-7 0-13 4-16 10l-58 122c-5 10 2 22 14 22h72l-58 128c-5 11 7 22 18 15l172-122
           c10-7 5-22-7-22h-78l56-118c5-11-3-23-15-23h-100Z"
        fill="url(#sparkGradient)"
        stroke="#FFFFFF"
        stroke-width="10"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>
