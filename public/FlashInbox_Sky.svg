<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" /> <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" /> </linearGradient>
    
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7971E;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="flapGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>

    <filter id="glowShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="90" fill="url(#bgGradient)" />

  <path d="M40 180 L256 340 L472 180" stroke="url(#flapGradient)" stroke-width="2" fill="white" fill-opacity="0.1"/>
  <path d="M40 180 L256 340 L472 180 V382 C472 431.7 431.7 472 382 472 H130 C80.3 472 40 431.7 40 382 V180 Z" fill="url(#bgGradient)" fill-opacity="0.3"/>

  <g filter="url(#glowShadow)">
    <path d="M226 88 L170 232 H258 L202 408 L378 200 H290 L346 88 H226 Z" fill="url(#boltGradient)"/>
  </g>
  
  <circle cx="430" cy="80" r="120" fill="white" fill-opacity="0.05" />
</svg>