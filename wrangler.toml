#:schema node_modules/wrangler/config-schema.json
name = "flashinbox"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 主应用入口
main = ".open-next/worker.js"

# 资源目录
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "flashinbox-db"
database_id = "local-flashinbox-db"

[[send_email]]
name = "EMAIL"

# 环境变量（非敏感配置）
[vars]
DEFAULT_DOMAIN = "" # 部署时填写实际 ID
KEY_EXPIRE_DAYS = "15"
UNCLAIMED_EXPIRE_DAYS = "7"
SESSION_EXPIRE_HOURS = "24"
ADMIN_SESSION_EXPIRE_HOURS = "4"
MAX_BODY_TEXT = "102400"
MAX_BODY_HTML = "512000"
SEND_RATE_LIMIT_HOUR = "20"
SEND_RATE_LIMIT_DAY = "100"
SEND_MAX_RECIPIENTS = "10"
SEND_MAX_SUBJECT_CHARS = "180"
SEND_MAX_BODY_TEXT_CHARS = "3000"
SEND_MAX_ATTACHMENT_URLS = "10"
SEND_ALLOWED_IFRAME_DOMAINS = "youtube.com,youtu.be,vimeo.com,bilibili.com,player.bilibili.com"
SEND_POLICY_MODE = "unrestricted" # unrestricted / whitelist / blacklist
SEND_RECIPIENT_WHITELIST = "" # example.com,@team.example,vip@example.net
SEND_RECIPIENT_BLACKLIST = "" # spam.example,blocked@example.net
ADMIN_TOKEN = "" # 仅用于本地/测试；生产环境建议使用 wrangler secret put

# Secrets（通过 wrangler secret put 设置）
# - ADMIN_TOKEN
# - KEY_PEPPER
# - SESSION_SECRET
# - TURNSTILE_SECRET_KEY
# - TURNSTILE_SITE_KEY

# 生产环境配置
[env.production]
name = "flashinbox"
routes = [
    { pattern = "mail.flashinbox.de", custom_domain = true },
    { pattern = "flashinbox.hxcn.top", custom_domain = true}
    ]

[env.production.vars]
DEFAULT_DOMAIN = "" # 部署时填写实际 ID
KEY_EXPIRE_DAYS = "15"
UNCLAIMED_EXPIRE_DAYS = "7"
SESSION_EXPIRE_HOURS = "24"
ADMIN_SESSION_EXPIRE_HOURS = "4"
MAX_BODY_TEXT = "102400"
MAX_BODY_HTML = "512000"
UMAMI_SCRIPT_URL = "" # 部署时填写实际 ID
UMAMI_WEBSITE_ID = "" # 部署时填写实际 ID
UMAMI_ADMIN_WEBSITE_ID = "" # 部署时填写实际 ID
SEND_RATE_LIMIT_HOUR = "20"
SEND_RATE_LIMIT_DAY = "100"
SEND_MAX_RECIPIENTS = "10"
SEND_MAX_SUBJECT_CHARS = "180"
SEND_MAX_BODY_TEXT_CHARS = "3000"
SEND_MAX_ATTACHMENT_URLS = "10"
SEND_ALLOWED_IFRAME_DOMAINS = "youtube.com,youtu.be,vimeo.com,bilibili.com,player.bilibili.com"
SEND_POLICY_MODE = "unrestricted" # unrestricted / whitelist / blacklist
SEND_RECIPIENT_WHITELIST = "" # example.com,@team.example,vip@example.net
SEND_RECIPIENT_BLACKLIST = "" # spam.example,blocked@example.net

[[env.production.d1_databases]]
binding = "DB"
database_name = "flashinbox-db"
database_id = "local-flashinbox-db"
remote = true

[[env.production.send_email]]
name = "EMAIL"
remote = true
